name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  plan:
    name: CI Plan
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    outputs:
      mode: ${{ steps.extract.outputs.mode }}
      crates: ${{ steps.extract.outputs.crates }}
      test: ${{ steps.extract.outputs.test }}
      docs: ${{ steps.extract.outputs.docs }}
      build: ${{ steps.extract.outputs.build }}
      base_ref: ${{ steps.resolve-base.outputs.base_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-rail 0.11.0
        run: cargo binstall cargo-rail --locked --version 0.11.0 --no-confirm

      - name: Resolve BASE_REF
        id: resolve-base
        env:
          SINCE_INPUT: ${{ github.event.inputs.since }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ -n "$SINCE_INPUT" ]; then
            BASE_REF="$SINCE_INPUT"
          elif [ -n "$GITHUB_BASE_REF" ]; then
            BASE_REF="origin/$GITHUB_BASE_REF"
          elif [ -n "$BEFORE_SHA" ] && ! echo "$BEFORE_SHA" | grep -qE '^0+$'; then
            BASE_REF="$BEFORE_SHA"
          else
            BASE_REF="origin/main"
          fi
          if ! git rev-parse --verify "$BASE_REF" >/dev/null 2>&1; then
            BASE_REF="HEAD~1"
          fi
          echo "BASE_REF=$BASE_REF" >> "$GITHUB_ENV"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"

      - name: Run cargo rail plan
        run: cargo rail plan --quiet --since "$BASE_REF" --json -o "$RUNNER_TEMP/plan.json"

      - name: Extract plan outputs
        id: extract
        run: |
          PLAN="$RUNNER_TEMP/plan.json"
          MODE=$(jq -r '.scope.mode // "workspace"' "$PLAN")
          CRATES=$(jq -r '.scope.crates // [] | join(" ")' "$PLAN")
          TEST=$(jq -r '.surfaces.test.enabled // false' "$PLAN")
          DOCS=$(jq -r '.surfaces.docs.enabled // false' "$PLAN")
          BUILD=$(jq -r '.surfaces.build.enabled // false' "$PLAN")
          { echo "mode=$MODE"; echo "crates=$CRATES"; echo "test=$TEST"; echo "docs=$DOCS"; echo "build=$BUILD"; } >> "$GITHUB_OUTPUT"
          { echo "MODE=$MODE"; echo "CRATES=$CRATES"; echo "TEST=$TEST"; echo "DOCS=$DOCS"; echo "BUILD=$BUILD"; } >> "$GITHUB_ENV"

      - name: Render step summary
        run: |
          {
            echo "## CI Plan"
            echo "- Base ref: $BASE_REF"
            echo "- Mode: $MODE"
            echo "- Crates: ${CRATES:-—}"
            echo "- Surfaces: test=$TEST, docs=$DOCS, build=$BUILD"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and index
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v5
        with:
          path: target/
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check

  build:
    name: Build Check
    runs-on: ${{ matrix.os }}
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and index
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v5
        with:
          path: target/
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Check compilation
        run: cargo check --workspace --exclude xtask --verbose

  build-wasm:
    name: WASM Build Check
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target (for pinned toolchain)
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry and index
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-cargo-

      - name: Check WASM compilation (SDK + FFI WASM)
        run: cargo check -p forgeguard_sdk -p forgeguard_ffi_wasm --target wasm32-unknown-unknown

  unused-deps:
    name: Check Unused Dependencies
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-rail
        run: cargo binstall cargo-rail --locked --version 0.11.0 --no-confirm

      - name: Check for unused dependencies
        run: cargo rail unify --check

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  typos:
    name: Check Typos
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check for typos
        uses: crate-ci/typos@master
