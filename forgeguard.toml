# ForgeGuard Control Plane — Authorization Configuration
# ======================================================
# This is the control plane's own authorization model, managed via:
#
#   cargo xtask control-plane cedar sync  --config forgeguard.toml
#   cargo xtask control-plane cedar diff  --config forgeguard.toml
#   cargo xtask control-plane cedar status
#
# ForgeGuard dogfoods its own authorization system. The control plane
# uses the forgeguard-axum middleware to enforce these policies via
# AWS Verified Permissions. Everything here is public — only the
# policy_store_id is resolved from 1Password at sync time.
#
# For the proxy demo configuration, see examples/todo-app/forgeguard.toml.

# ---------------------------------------------------------------------------
# Authorization Target
# ---------------------------------------------------------------------------

[authz]
policy_store_id = "op://forgeguard-prod/verified-permissions/policy-store-id"

# ---------------------------------------------------------------------------
# Cedar Schema
# ---------------------------------------------------------------------------
# Entity types and explicit actions for the control plane's authorization
# model. Actions from RBAC policies below are auto-collected and merged.
# User (memberOfTypes: ["Group"]) and Group are always implicit.

[schema]
namespace = "forgeguard"
actions = ["cp-proxy-config-read", "cp-organization-delete", "cp-member-promote-owner"]

[schema.entities.User.attributes]
org_id = "String"

[schema.entities.Organization.attributes]
org_id = "String"

[schema.entities.Machine.attributes]
org_id = "String"

# ---------------------------------------------------------------------------
# Tenant Scoping
# ---------------------------------------------------------------------------
# All RBAC policies are scoped per-organization by default.

[tenant]
principal_attribute = "org_id"
resource_attribute = "org_id"

# ---------------------------------------------------------------------------
# Roles (RBAC policies — compiled to Cedar)
# ---------------------------------------------------------------------------
# Each role maps 1:1 to a JWT cognito:groups claim. Roles inherit
# permissions from parent roles via `inherits`. The RBAC compiler
# auto-appends tenant scoping: when { principal.org_id == resource.org_id }

[[policies]]
name = "member"
description = "Read-only org access"
allow = ["cp-organization-read", "cp-key-read", "cp-config-read"]

[[policies]]
name = "admin"
description = "Org management without deletion or owner promotion"
inherits = ["member"]
allow = [
  "cp-organization-create", "cp-organization-update",
  "cp-member-invite", "cp-member-remove", "cp-member-change-role",
  "cp-config-write",
  "cp-key-generate", "cp-key-revoke", "cp-key-rotate",
]

[[policies]]
name = "owner"
description = "Full org access including deletion and owner promotion"
inherits = ["admin"]
allow = ["cp-organization-delete", "cp-member-promote-owner"]

# ---------------------------------------------------------------------------
# Cedar Policies (raw Cedar — for patterns RBAC can't express)
# ---------------------------------------------------------------------------

[[policies]]
type = "cedar"
name = "machine-proxy-config-read"
description = "Machine principals can read their own org proxy config"
body = """
permit(
  principal is forgeguard::Machine,
  action == forgeguard::Action::"cp-proxy-config-read",
  resource
) when { resource.org_id == principal.org_id };
"""
