# This is a configuration file for the bacon tool
#
# Bacon repository: https://github.com/Canop/bacon
# Complete help on configuration: https://dystroy.org/bacon/config/
# You can also check bacon's own bacon.toml file
#  as an example: https://github.com/Canop/bacon/blob/main/bacon.toml

default_job = "check"

[jobs.check]
command = ["cargo", "check", "--workspace", "--color", "always"]
need_stdout = false

[jobs.check-all]
command = [
  "cargo",
  "check",
  "--workspace",
  "--all-targets",
  "--color",
  "always",
]
need_stdout = false

[jobs.clippy]
command = [
  "cargo",
  "clippy",
  "--workspace",
  "--all-targets",
  "--color",
  "always",
]
need_stdout = false

[jobs.test]
command = [
  "cargo",
  "test",
  "--workspace",
  "--color",
  "always",
  "--",
  "--color",
  "always",      # see https://github.com/Canop/bacon/issues/124
]
need_stdout = true
default_watch = false
watch = ["crates"]

[jobs.doc]
command = ["cargo", "doc", "--workspace", "--color", "always", "--no-deps"]
need_stdout = false

# If the doc compiles, then it opens in your browser and bacon switches
# to the previous job
[jobs.doc-open]
command = [
  "cargo",
  "doc",
  "--workspace",
  "--color",
  "always",
  "--no-deps",
  "--open",
]
need_stdout = false
on_success = "back" # so that we don't open the browser at each change

# Run a specific binary. Use: bacon run -- -p forgeguard_cli
# or override this command for the binary you're actively developing.
[jobs.run]
command = ["cargo", "run", "--color", "always", "-p", "forgeguard_cli"]
need_stdout = true
allow_warnings = true

# You may define here keybindings that would be specific to
# a project, for example a shortcut to launch a specific job.
# Shortcuts to internal functions (scrolling, toggling, etc.)
# should go in your personal global prefs.toml file instead.
[keybindings]
j = "scroll-lines(1)"
k = "scroll-lines(-1)"
ctrl-d = "scroll-pages(1)"
ctrl-u = "scroll-pages(-1)"
g = "scroll-to-top"
shift-g = "scroll-to-bottom"
