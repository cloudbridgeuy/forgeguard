# ForgeGuard Demo — docker-compose
# ==================================
# Starts the proxy + TODO app. The proxy builds from the repo root.
#
# Usage:
#   docker compose up --build

services:
  app:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./app.py:/app/app.py:ro
      - ./requirements.txt:/app/requirements.txt:ro
    command: >
      sh -c "pip install -q -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 5s
      timeout: 3s
      retries: 3

  proxy:
    build:
      context: ../..
      dockerfile: crates/proxy/Dockerfile
    volumes:
      - ./forgeguard.toml:/etc/forgeguard/forgeguard.toml:ro
      - ~/.aws:/root/.aws:ro
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    depends_on:
      app:
        condition: service_healthy
    command: ["run", "--config", "/etc/forgeguard/forgeguard.toml", "--debug"]
